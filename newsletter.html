<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKALA 뉴스레터</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: #0f1c2f;
        --text: #f4f7fb;
        --muted: #9fb3c8;
        --accent: #52c7ff;
        --accent-2: #8b7cff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Pretendard", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--bg), #15263e);
        color: var(--text);
        line-height: 1.6;
      }

      .container {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 24px 0;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .nav a {
        color: var(--muted);
        text-decoration: none;
        margin-left: 16px;
      }

      .hero {
        padding: 48px 0 32px;
      }

      .hero-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(0,0,0,0.2);
      }

      .hero h1 {
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        margin: 0 0 12px;
      }

      .hero p {
        color: var(--muted);
        font-size: 1rem;
        margin: 0 0 20px;
      }

      .pill {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(82, 199, 255, 0.16);
        color: var(--accent);
        font-size: 0.9rem;
        margin-bottom: 16px;
      }

      .form {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      input {
        flex: 1;
        min-width: 220px;
        padding: 12px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.06);
        color: var(--text);
      }

      button {
        padding: 12px 18px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 24px;
      }

      .feature {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .feature h3 {
        margin-top: 0;
        margin-bottom: 6px;
      }

      .feature p {
        margin: 0;
        color: var(--muted);
      }

      footer {
        padding: 30px 0 40px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 700px) {
        .features {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container nav">
        <div class="logo">SKALA</div>
        <nav>
          <a href="index.html">홈</a>
          <a href="newsletter.html">뉴스레터</a>
        </nav>
      </div>
    </header>

    <main class="container hero">
      <section class="hero-card">
        <span class="pill">SKALA 뉴스레터</span>
        <h1>최신 인사이트와 성장 소식을 받아보세요</h1>
        <p>
          기술, 서비스, 브랜드에 대한 실무 노하우와 SKALA의 최신 이야기를 매주
          전달해드립니다.
        </p>

        <form class="form">
          <input type="email" placeholder="이메일 주소를 입력하세요" />
          <button type="submit">구독하기</button>
        </form>

        <div class="features">
          <div class="feature">
            <h3>실무 중심</h3>
            <p>바로 활용할 수 있는 인사이트를 담아 전달합니다.</p>
          </div>
          <div class="feature">
            <h3>정기 소식</h3>
            <p>주요 프로젝트와 최신 트렌드를 쉽고 빠르게 확인하세요.</p>
          </div>
          <div class="feature">
            <h3>커뮤니티</h3>
            <p>함께 성장하는 사람들과 아이디어를 나누는 공간입니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">© 2026 SKALA Newsletter</div>
    </footer>
  </body>
</html>
